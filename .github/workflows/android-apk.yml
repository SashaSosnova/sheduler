name: Android APK release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          sdkmanager --install "platform-tools" "platforms;android-36" "build-tools;36.0.0"
          yes | sdkmanager --licenses || true

      - name: Install dependencies
        run: npm ci

      - name: Write Firebase env for Vite build
        run: |
          printf '%s\n' \
            'VITE_FIREBASE_API_KEY=AIzaSyAhQbHjLZXE9eLunAHpDQv7TP9Xv6s6ETE' \
            'VITE_FIREBASE_AUTH_DOMAIN=kid-sheduler.firebaseapp.com' \
            'VITE_FIREBASE_PROJECT_ID=kid-sheduler' \
            'VITE_FIREBASE_STORAGE_BUCKET=kid-sheduler.firebasestorage.app' \
            'VITE_FIREBASE_MESSAGING_SENDER_ID=320223710326' \
            'VITE_FIREBASE_APP_ID=1:320223710326:web:4698479b8dc6a466d3a357' \
            > .env

      - name: Build web app
        run: npm run build

      - name: Cap sync Android
        run: npx cap sync android

      - name: Ensure release keystore exists
        run: |
          if [ ! -f android/kanikuly.keystore ]; then
            echo "Committed keystore missing — refusing to invent a new one"
            exit 1
          fi
          keytool -list -keystore android/kanikuly.keystore -storepass kanikuly2026 -storetype PKCS12

      - name: Assemble signed release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: Verify and save APK
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/release/app-release.apk release/sheduler.apk
          cp release/sheduler.apk release/kanikuly.apk
          "$ANDROID_SDK_ROOT/build-tools/36.0.0/apksigner" verify --verbose --print-certs release/sheduler.apk
          BADGING=$("$ANDROID_SDK_ROOT/build-tools/36.0.0/aapt" dump badging release/sheduler.apk)
          echo "$BADGING" | head -n 20
          if echo "$BADGING" | grep -q "testOnly='true'"; then
            echo "ERROR: APK is testOnly — cannot sideload from Files"
            exit 1
          fi
          ls -lh release/

      - uses: actions/upload-artifact@v4
        with:
          name: sheduler-apk
          path: |
            release/sheduler.apk
            release/kanikuly.apk
          if-no-files-found: error

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete apk-latest --yes --cleanup-tag || true
          gh release create apk-latest \
            release/sheduler.apk \
            release/kanikuly.apk \
            --title "Sheduler 2.6" \
            --notes "$(cat <<'EOF'
          **Sheduler v2.6** — APK для установки с файла (без adb).

          Что нового:
          - крупнее нижнее меню (настройки через ⚙ на главном)
          - родитель может отмечать must-do и добавлять планы на день
          - уведомления родителю: зарядка и дневник жевания через облако
          - правки календаря и UX

          Package id: `com.sosnova.sheduler`.

          Как поставить на Samsung:
          1. Удали старое приложение Kanikuly / Sheduler, если есть.
          2. Автоблокировка → выкл.
          3. Мои файлы → Установка неизвестных приложений → разрешить.
          4. Скачай **sheduler.apk** и открой из Downloads.

          Дальше обновления с той же ссылки должны ставиться поверх.
          EOF
          )" \
            --latest
