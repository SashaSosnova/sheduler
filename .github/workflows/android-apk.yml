name: Android APK release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          sdkmanager --install "platform-tools" "platforms;android-36" "build-tools;36.0.0"
          yes | sdkmanager --licenses || true

      - name: Install dependencies
        run: npm ci

      - name: Write Firebase env for Vite build
        run: |
          printf '%s\n' \
            'VITE_FIREBASE_API_KEY=AIzaSyAhQbHjLZXE9eLunAHpDQv7TP9Xv6s6ETE' \
            'VITE_FIREBASE_AUTH_DOMAIN=kid-sheduler.firebaseapp.com' \
            'VITE_FIREBASE_PROJECT_ID=kid-sheduler' \
            'VITE_FIREBASE_STORAGE_BUCKET=kid-sheduler.firebasestorage.app' \
            'VITE_FIREBASE_MESSAGING_SENDER_ID=320223710326' \
            'VITE_FIREBASE_APP_ID=1:320223710326:web:4698479b8dc6a466d3a357' \
            > .env

      - name: Build web app
        run: npm run build

      - name: Cap sync Android
        run: npx cap sync android

      - name: Ensure release keystore exists
        run: |
          if [ ! -f android/kanikuly.keystore ]; then
            echo "Committed keystore missing — refusing to invent a new one"
            exit 1
          fi
          keytool -list -keystore android/kanikuly.keystore -storepass kanikuly2026 -storetype PKCS12

      - name: Assemble signed release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: Verify and save APK
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/release/app-release.apk release/kanikuly.apk
          "$ANDROID_SDK_ROOT/build-tools/36.0.0/apksigner" verify --verbose --print-certs release/kanikuly.apk
          "$ANDROID_SDK_ROOT/build-tools/36.0.0/aapt" dump badging release/kanikuly.apk | head -n 15
          ls -lh release/kanikuly.apk

      - uses: actions/upload-artifact@v4
        with:
          name: kanikuly-apk
          path: release/kanikuly.apk
          if-no-files-found: error

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete apk-latest --yes --cleanup-tag || true
          gh release create apk-latest \
            release/kanikuly.apk \
            --title "Kanikuly 2.2" \
            --notes "$(cat <<'EOF'
          Подписанный release APK **v2.2** со стабильным keystore.

          Установка с файла на Samsung:
          1. Автоблокировка → выкл.
          2. Мои файлы → установка неизвестных приложений → разрешить.
          3. Удали старое Kanikuly один раз (смена подписи).
          4. Скачай kanikuly.apk и установи из Downloads.

          Дальше обновления с файла должны вставать без adb.
          EOF
          )" \
            --latest
