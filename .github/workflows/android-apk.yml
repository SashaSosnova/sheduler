name: Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          sdkmanager --install "platform-tools" "platforms;android-36" "build-tools;36.0.0"
          yes | sdkmanager --licenses || true

      - name: Install dependencies
        run: npm ci

      - name: Write Firebase env for Vite build
        run: |
          printf '%s\n' \
            'VITE_FIREBASE_API_KEY=AIzaSyAhQbHjLZXE9eLunAHpDQv7TP9Xv6s6ETE' \
            'VITE_FIREBASE_AUTH_DOMAIN=kid-sheduler.firebaseapp.com' \
            'VITE_FIREBASE_PROJECT_ID=kid-sheduler' \
            'VITE_FIREBASE_STORAGE_BUCKET=kid-sheduler.firebasestorage.app' \
            'VITE_FIREBASE_MESSAGING_SENDER_ID=320223710326' \
            'VITE_FIREBASE_APP_ID=1:320223710326:web:4698479b8dc6a466d3a357' \
            > .env

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: Verify APK + dump badging
        run: |
          APK=android/app/build/outputs/apk/debug/app-debug.apk
          "$ANDROID_SDK_ROOT/build-tools/36.0.0/apksigner" verify --verbose --print-certs "$APK"
          "$ANDROID_SDK_ROOT/build-tools/36.0.0/aapt" dump badging "$APK" | head -n 40
          unzip -l "$APK" | head -n 50
          # Ensure v1 JAR signature exists (Samsung sideload friendliness)
          unzip -l "$APK" | grep -E 'META-INF/.*\.(RSA|SF|MF)' || (echo "MISSING v1 META-INF signatures" && exit 1)

      - name: Prepare APK artifact
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk release/kanikuly.apk
          ls -lh release/
          # Sanity: must look like a zip/apk
          file release/kanikuly.apk

      - uses: actions/upload-artifact@v4
        with:
          name: kanikuly-apk
          path: release/kanikuly.apk
          if-no-files-found: error

      - name: Replace GitHub release (single APK only)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete apk-latest --yes --cleanup-tag || true
          gh release create apk-latest release/kanikuly.apk \
            --title "Каникулы — APK" \
            --notes "$(cat <<'EOF'
          APK v1.3 (упрощённая сборка как у home-garden).

          Перед установкой на Samsung Z Flip:
          1. Настройки → Безопасность → Автоблокировка → выкл.
          2. Play Store → профиль → Play Protect → настройки → выключи «Проверять приложения».
          3. Удали все старые «Каникулы», если есть.
          4. Скачай kanikuly.apk и установи через «Мои файлы».

          Если снова «не установлено» — скачай файл на компьютер и перекинь на телефон через USB / Google Диск / Telegram (не открывай из браузера GitHub).
          EOF
          )" \
            --latest
