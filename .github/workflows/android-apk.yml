name: Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          sdkmanager --install "platform-tools" "platforms;android-36" "build-tools;36.0.0"
          yes | sdkmanager --licenses || true

      - name: Install dependencies
        run: npm ci

      - name: Write Firebase env for Vite build
        run: |
          printf '%s\n' \
            'VITE_FIREBASE_API_KEY=AIzaSyAhQbHjLZXE9eLunAHpDQv7TP9Xv6s6ETE' \
            'VITE_FIREBASE_AUTH_DOMAIN=kid-sheduler.firebaseapp.com' \
            'VITE_FIREBASE_PROJECT_ID=kid-sheduler' \
            'VITE_FIREBASE_STORAGE_BUCKET=kid-sheduler.firebasestorage.app' \
            'VITE_FIREBASE_MESSAGING_SENDER_ID=320223710326' \
            'VITE_FIREBASE_APP_ID=1:320223710326:web:4698479b8dc6a466d3a357' \
            > .env

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Create release keystore with keytool
        run: |
          keytool -genkeypair -v \
            -storetype PKCS12 \
            -keystore android/kanikuly.keystore \
            -alias kanikuly \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass kanikuly2026 \
            -keypass kanikuly2026 \
            -dname "CN=Kanikuly, O=Sosnova, C=RU"
          keytool -list -v \
            -keystore android/kanikuly.keystore \
            -storepass kanikuly2026 \
            -storetype PKCS12 | head -n 30

      - name: Build signed release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: Verify signed APK
        run: |
          APK=android/app/build/outputs/apk/release/app-release.apk
          ls -lh "$APK"
          "$ANDROID_SDK_ROOT/build-tools/36.0.0/apksigner" verify --verbose --print-certs "$APK"
          "$ANDROID_SDK_ROOT/build-tools/36.0.0/aapt" dump badging "$APK" | head -n 20
          unzip -l "$APK" | grep -E 'META-INF/.*\.(RSA|SF|MF)' || true

      - name: Prepare APK artifact
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/release/app-release.apk release/kanikuly.apk
          ls -lh release/
          file release/kanikuly.apk

      - uses: actions/upload-artifact@v4
        with:
          name: kanikuly-apk
          path: release/kanikuly.apk
          if-no-files-found: error

      - name: Replace GitHub release (single APK only)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete apk-latest --yes --cleanup-tag || true
          gh release create apk-latest release/kanikuly.apk \
            --title "Kanikuly — signed release APK" \
            --notes "$(cat <<'EOF'
          Signed **release** APK v1.5 (keystore via keytool, Capacitor sync + assembleRelease).

          1. Автоблокировка → выкл.
          2. Удали старые Kanikuly / Каникулы.
          3. Скачай `kanikuly.apk` (~файл) и установи через «Мои файлы».
          EOF
          )" \
            --latest
