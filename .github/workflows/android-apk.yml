name: Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          sdkmanager --install "platform-tools" "platforms;android-36" "build-tools;36.0.0"
          yes | sdkmanager --licenses || true

      - name: Install dependencies
        run: npm ci

      - name: Write Firebase env for Vite build
        run: |
          printf '%s\n' \
            'VITE_FIREBASE_API_KEY=AIzaSyAhQbHjLZXE9eLunAHpDQv7TP9Xv6s6ETE' \
            'VITE_FIREBASE_AUTH_DOMAIN=kid-sheduler.firebaseapp.com' \
            'VITE_FIREBASE_PROJECT_ID=kid-sheduler' \
            'VITE_FIREBASE_STORAGE_BUCKET=kid-sheduler.firebasestorage.app' \
            'VITE_FIREBASE_MESSAGING_SENDER_ID=320223710326' \
            'VITE_FIREBASE_APP_ID=1:320223710326:web:4698479b8dc6a466d3a357' \
            > .env

      - name: Build web + sync Capacitor
        run: npm run cap:sync

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Verify APK signature
        run: |
          "$ANDROID_SDK_ROOT/build-tools/36.0.0/apksigner" verify --verbose \
            android/app/build/outputs/apk/debug/app-debug.apk

      - name: Prepare APK artifact
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk release/kanikuly.apk
          ls -lh release/

      - uses: actions/upload-artifact@v4
        with:
          name: kanikuly-apk
          path: release/kanikuly.apk
          if-no-files-found: error

      - name: Replace GitHub release (single APK only)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete apk-latest --yes --cleanup-tag || true
          gh release create apk-latest release/kanikuly.apk \
            --title "Каникулы — APK" \
            --notes "$(cat <<'EOF'
          Debug APK приложения **Каникулы** (v1.2), собран как у home-garden.

          1. Если старое «Каникулы» установлено — удали его.
          2. На Samsung: Настройки → Безопасность и конфиденциальность → **Автоблокировка** → выключи.
          3. Скачай `kanikuly.apk` и установи.

          Сборка обновляется при каждом пуше в `main`.
          EOF
          )" \
            --latest
